<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="background-color" content="#ffffff" />
  <meta name="description" content="IKCOUS Marketplace - Produtos com estoque imediato em Monte Carmelo, MG" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="IKCOUS" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="IKCOUS" />
  <meta name="robots" content="index, follow" />

  <!-- Zero Cache Meta Tags - Defesa Extrema para PWA -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta http-equiv="Surrogate-Control" content="no-store" />

  <!-- Security Policy to eradicate "Not Secure" mixed-content warnings -->
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />


  <!-- Open Graph -->
  <meta property="og:title" content="IKCOUS Marketplace" />
  <meta property="og:description" content="Produtos com estoque imediato em Monte Carmelo, MG" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:url" content="/" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />


  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="IKCOUS Marketplace" />
  <meta name="twitter:description" content="Produtos com estoque imediato em Monte Carmelo, MG" />
  <meta name="twitter:image" content="/logo.svg" />

  <!-- PWA Manifest -->
  <!-- PWA Manifest injected by vite-plugin-pwa -->

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="apple-touch-icon" href="/logo.svg" />

  <!-- Preconnect & DNS-Prefetch for critical resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="preconnect" href="https://cafkrminfnokvgjqtkle.supabase.co" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <title>IKCOUS Marketplace</title>

  <link rel="stylesheet" href="/loading.css" />
  <!-- Speculation Rules API: browser-native prefetch (zero JS overhead, Chrome 109+) -->
  <script type="speculationrules">
  {
    "prefetch": [
      {
        "urls": ["/version.json"],
        "eagerness": "eager"
      },
      {
        "urls": ["/?source=pwa"],
        "eagerness": "moderate"
      }
    ]
  }
  </script>
</head>

<body>
  <div id="root">
    <div class="loading-spinner"></div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
